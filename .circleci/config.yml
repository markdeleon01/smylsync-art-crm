version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  install-and-cache:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - checkout
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - run:
          name: Enable pnpm via corepack
          command: sudo corepack enable pnpm && corepack prepare pnpm@10.32.1 --activate
      - run:
          name: Remove node_modules if exists
          command: rm -rf node_modules
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: cypress-binary-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.cache/Cypress
      - persist_to_workspace:
          root: .
          paths:
            - package.json
            - pnpm-lock.yaml
            - tsconfig.json
            - vitest.config.mts
            - vitest.setup.ts
            - cypress.config.ts
            - app/
            - components/
            - lib/
            - public/

  unit-tests:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - checkout
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - run:
          name: Enable pnpm via corepack
          command: sudo corepack enable pnpm && corepack prepare pnpm@10.32.1 --activate
      - attach_workspace:
          at: .
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Run unit tests with Vitest
          command: pnpm test -- --run
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage

  type-check:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - checkout
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - run:
          name: Enable pnpm via corepack
          command: sudo corepack enable pnpm && corepack prepare pnpm@10.32.1 --activate
      - attach_workspace:
          at: .
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Type check with TypeScript
          command: pnpm exec tsc --noEmit

  build:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - checkout
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - run:
          name: Enable pnpm via corepack
          command: sudo corepack enable pnpm && corepack prepare pnpm@10.32.1 --activate
      - attach_workspace:
          at: .
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Build Next.js application
          command: pnpm build
      - save_cache:
          key: next-build-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - .next
      - store_artifacts:
          path: .next

  e2e-tests:
    docker:
      - image: cimg/node:20.12.0-browsers
    steps:
      - checkout
      - run:
          name: Enable pnpm via corepack
          command: sudo corepack enable pnpm && corepack prepare pnpm@10.32.1 --activate
      - attach_workspace:
          at: .
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - restore_cache:
          key: cypress-binary-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Verify Cypress binary
          command: pnpm exec cypress install --force
      - restore_cache:
          key: next-build-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Validate database environment
          command: |
            if [ -z "$POSTGRES_URL" ]; then
              echo "POSTGRES_URL is not set. Configure it in CircleCI project env vars or context."
              exit 1
            fi
      - run:
          name: Run database migrations
          command: pnpm run migrate:ci
      - run:
          name: Seed users for e2e tests
          command: pnpm run seed:users:ci
      - run:
          name: Start development server
          command: pnpm dev
          background: true
      - run:
          name: Wait for server to start
          command: pnpm exec wait-on http://localhost:8080 --timeout 60000
      - run:
          name: Run Cypress e2e tests
          command: pnpm cypress:run
      - store_artifacts:
          path: cypress/screenshots
      - store_artifacts:
          path: cypress/videos

workflows:
  version: 2
  test-and-build:
    jobs:
      - install-and-cache
      - unit-tests:
          requires:
            - install-and-cache
      - type-check:
          requires:
            - install-and-cache
      - build:
          requires:
            - unit-tests
            - type-check
      - e2e-tests:
          requires:
            - build
