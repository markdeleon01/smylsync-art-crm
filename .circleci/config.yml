version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  install-and-cache:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - checkout
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - run:
          name: Remove node_modules if exists
          command: rm -rf node_modules
      - run:
          name: Install dependencies
          command: npm ci
      - persist_to_workspace:
          root: .
          paths:
            - package.json
            - package-lock.json
            - tsconfig.json
            - vitest.config.ts
            - cypress.config.ts
            - app/
            - components/
            - lib/
            - public/

  unit-tests:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - attach_workspace:
          at: .
      - run:
          name: Remove node_modules if exists
          command: rm -rf node_modules
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Rebuild native modules
          command: npm rebuild
      - run:
          name: Run unit tests with Vitest
          command: npm run test -- --run
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage

  type-check:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - attach_workspace:
          at: .
      - run:
          name: Remove node_modules if exists
          command: rm -rf node_modules
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Rebuild native modules
          command: npm rebuild
      - run:
          name: Type check with TypeScript
          command: npx tsc --noEmit

  build:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - attach_workspace:
          at: .
      - run:
          name: Remove node_modules if exists
          command: rm -rf node_modules
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Rebuild native modules
          command: npm rebuild
      - run:
          name: Build Next.js application
          command: npm run build
      - save_cache:
          key: next-build-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - .next
      - store_artifacts:
          path: .next

  e2e-tests:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - run:
          name: Install build dependencies
          command: sudo apt-get update && sudo apt-get install -y python3 build-essential
      - attach_workspace:
          at: .
      - run:
          name: Remove node_modules if exists
          command: rm -rf node_modules
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Rebuild native modules
          command: npm rebuild
      - restore_cache:
          key: next-build-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Start development server
          command: npm run dev
          background: true
      - run:
          name: Wait for server to start
          command: npx wait-on http://localhost:3000 --timeout 60000
      - run:
          name: Run Cypress e2e tests
          command: npm run cypress:run
      - store_artifacts:
          path: cypress/screenshots
      - store_artifacts:
          path: cypress/videos

workflows:
  version: 2
  test-and-build:
    jobs:
      - install-and-cache
      - unit-tests:
          requires:
            - install-and-cache
      - type-check:
          requires:
            - install-and-cache
      - build:
          requires:
            - unit-tests
            - type-check
      - e2e-tests:
          requires:
            - build
