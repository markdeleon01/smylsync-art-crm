version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  install-and-cache:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci --legacy-peer-deps
      - save_cache:
          key: node-modules-v2-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - .

  unit-tests:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run unit tests with Vitest
          command: npm run test -- --run
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage

  type-check:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Type check with TypeScript
          command: npx tsc --noEmit

  build:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Build Next.js application
          command: npm run build --legacy-peer-deps
      - save_cache:
          key: next-build-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - .next
      - store_artifacts:
          path: .next

  e2e-tests:
    executor:
      name: node/default
      tag: '20.12.0'
    steps:
      - attach_workspace:
          at: .
      - restore_cache:
          key: next-build-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Start development server
          command: npm run dev
          background: true
      - run:
          name: Wait for server to start
          command: npx wait-on http://localhost:3000 --timeout 60000
      - run:
          name: Run Cypress e2e tests
          command: npm run cypress:run
      - store_artifacts:
          path: cypress/screenshots
      - store_artifacts:
          path: cypress/videos

workflows:
  version: 2
  test-and-build:
    jobs:
      - install-and-cache
      - unit-tests:
          requires:
            - install-and-cache
      - type-check:
          requires:
            - install-and-cache
      - build:
          requires:
            - unit-tests
            - type-check
      - e2e-tests:
          requires:
            - build
